AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  canteen-order-system
  SAM Template for a highly resilient, event-driven ordering system using a default CloudFront domain.

Globals:
  Function:
    Timeout: 10
    Tracing: Active
    LoggingConfig:
      LogFormat: JSON
  Api:
    TracingEnabled: true
    Cors:
      AllowMethods: "'OPTIONS,POST'"
      AllowHeaders: "'Content-Type'"
      AllowOrigin: "'*'" # Required so your CloudFront frontend can talk to your API Gateway

Parameters:
  GoogleAppsScriptUrl:
    Description: The Web App URL generated by Google Apps Script
    Type: String
    Default: "https://script.google.com/macros/s/AKfycbzhcrvUvPElxtPy6ACn8k8Eaxzhi2i77A4HOK5od6Yusjk1Rc7oINeCHHsM59JewwxI/exec"

Resources:
  # ==========================================
  # 1. FRONTEND: S3 & CloudFront
  # ==========================================
  MyWebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "canteen-frontend-v1-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: canteen-frontend

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      PolicyDocument:
        Id: WebsitePolicy
        Version: 2012-10-17
        Statement:
          - Sid: AllowCloudFrontServicePrincipalReadOnly
            Effect: Allow
            Principal:
              Service: 'cloudfront.amazonaws.com'
            Action: "s3:GetObject"
            Resource: !Sub "arn:aws:s3:::${MyWebsiteBucket}/*"
            Condition:
              StringEquals:
                'AWS:SourceArn': !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'
      Bucket: !Ref MyWebsiteBucket

  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "canteen-oac-${AWS::StackName}"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        DefaultCacheBehavior:
          Compress: true
          TargetOriginId: !Sub 'S3-${MyWebsiteBucket}'
          ViewerProtocolPolicy: 'redirect-to-https'
          ForwardedValues:
            QueryString: false
        Enabled: true
        HttpVersion: 'http2'
        DefaultRootObject: 'index.html'
        IPV6Enabled: true
        Origins:
          - DomainName: !GetAtt MyWebsiteBucket.RegionalDomainName
            Id: !Sub 'S3-${MyWebsiteBucket}'
            OriginAccessControlId: !Ref OriginAccessControl
            S3OriginConfig: {}
        PriceClass: 'PriceClass_100'
        ViewerCertificate:
          CloudFrontDefaultCertificate: true # Tells CloudFront to use its own free built-in SSL

  # ==========================================
  # 2. MESSAGE BROKER: SQS Queues
  # ==========================================
  OrderDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600 # 14 days to hold failed orders

  OrderQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 30 # Time Lambda has to process before SQS makes the message visible again
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt OrderDeadLetterQueue.Arn
        maxReceiveCount: 3

  # ==========================================
  # 3. BACKEND: API Gateway to SQS Integration
  # ==========================================
  ApiGatewayToSQSRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ApiGatewaySQSPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt OrderQueue.Arn

  OrderApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      DefinitionBody:
        openapi: 3.0.1
        info:
          title: Canteen Order API
        paths:
          /submit-order:
            post:
              responses:
                "200":
                  description: "Order safely queued"
              x-amazon-apigateway-integration:
                type: aws
                credentials: !GetAtt ApiGatewayToSQSRole.Arn
                uri: !Sub "arn:aws:apigateway:${AWS::Region}:sqs/path/${AWS::AccountId}/${OrderQueue.QueueName}"
                httpMethod: POST
                requestParameters:
                  integration.request.header.Content-Type: "'application/x-www-form-urlencoded'"
                requestTemplates:
                  application/json: "Action=SendMessage&MessageBody=$util.urlEncode($input.body)"
                responses:
                  default:
                    statusCode: "200"

  # ==========================================
  # 4. COMPUTE: Go Lambda Function
  # ==========================================
  ProcessOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/ # Ensure your Go code is inside a folder named 'backend'
      Handler: bootstrap 
      Runtime: provided.al2023 
      Architectures:
        - arm64 
      Environment:
        Variables:
          APPS_SCRIPT_URL: !Ref GoogleAppsScriptUrl
      Events:
        SQSQueueEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt OrderQueue.Arn
            BatchSize: 10

Outputs:
  WebsiteURL:
    Description: Your public CloudFront URL
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'
  ApiEndpoint:
    Description: The API Gateway URL to paste into your app.js fetch() request
    Value: !Sub "https://${OrderApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/submit-order"
  S3BucketName:
    Description: Website bucket name for GitHub Actions sync
    Value: !Ref MyWebsiteBucket
  CloudFrontDistributionId:
    Description: Distribution ID for GitHub Actions cache invalidation
    Value: !Ref CloudFrontDistribution